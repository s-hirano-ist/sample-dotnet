name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: .NET test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Verify EF Core migrations
        run: dotnet ef migrations has-pending-model-changes --project TodoApi --startup-project TodoApi --no-build

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore --results-directory TestResults --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: "**/TestResults/**/coverage.cobertura.xml"
          if-no-files-found: error

  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate compose.yaml
        run: docker compose config --quiet

  container:
    name: Build container image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: todo-api:ci
