name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: .NET test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Verify EF Core migrations
        run: dotnet ef migrations has-pending-model-changes --project TodoApi --startup-project TodoApi --configuration Release --no-build

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore --results-directory TestResults --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: "**/TestResults/**/coverage.cobertura.xml"
          if-no-files-found: error

  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate compose.yaml
        run: docker compose config --quiet

  container:
    name: Build container image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: todo-api:ci

  compose-integration:
    name: PostgreSQL Compose integration
    needs: container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Compose services
        run: docker compose up -d --build

      - name: Wait for API readiness
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8080/ready; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Verify Todo API uses PostgreSQL
        run: |
          curl --fail --silent -X POST http://localhost:8080/todos \
            -H 'Content-Type: application/json' \
            -H 'X-API-Key: compose-dev-api-key' \
            -d '{"title":"Compose PostgreSQL smoke test"}'
          curl --fail --silent http://localhost:8080/todos

      - name: Stop Compose services
        if: always()
        run: docker compose down --volumes
