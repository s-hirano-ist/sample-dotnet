services:
  todo-api-permissions:
    image: sample-dotnet-todo-api
    user: "0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 1654:1654 /data /keys"]
    volumes:
      - todo-data:/data
      - data-protection-keys:/keys

  todo-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__TodoDatabase: Data Source=/data/todo.db
      ConnectionStrings__Redis: redis:6379
      Authentication__ApiKey: ${TODO_API_KEY:-compose-dev-api-key}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      RateLimit__Store: Redis
      RateLimit__PermitLimit: 10
      RateLimit__WindowSeconds: 10
      Idempotency__Store: Redis
      Idempotency__EntryLifetimeSeconds: 300
      Idempotency__WaitTimeoutSeconds: 5
    volumes:
      - todo-data:/data
      - data-protection-keys:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      redis:
        condition: service_healthy
      todo-api-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  todo-data:
  data-protection-keys:
